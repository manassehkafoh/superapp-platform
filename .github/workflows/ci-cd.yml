###############################################################################
# SuperApp Monorepo — GitHub Actions CI/CD
# Monorepo-aware: detects which services changed using path filters,
# only builds/deploys affected services (saves 60-80% CI time).
#
# Pipeline stages:
#   detect-changes  → Determine which services/layers changed
#   security-scan   → TruffleHog, CodeQL, Trivy (always runs)
#   build           → dotnet build + test + Docker + Cosign (per changed service)
#   terraform-plan  → Plan infra changes (if platform/** changed)
#   deploy-dev      → Auto-deploy to dev
#   deploy-staging  → Auto-deploy to staging
#   deploy-prod     → Manual gate → canary → verify
#   dora-metrics    → Push deployment frequency + lead time
###############################################################################

name: SuperApp CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "8.0.x"
  REGISTRY: acrsuperapp.azurecr.io
  COVERAGE_THRESHOLD: 80

jobs:
  ###########################################################################
  # JOB 1 — Detect which services/layers changed (monorepo path filtering)
  ###########################################################################
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      identity-api:       ${{ steps.filter.outputs.identity-api }}
      payment-api:        ${{ steps.filter.outputs.payment-api }}
      wallet-api:         ${{ steps.filter.outputs.wallet-api }}
      account-api:        ${{ steps.filter.outputs.account-api }}
      notification-api:   ${{ steps.filter.outputs.notification-api }}
      api-gateway:        ${{ steps.filter.outputs.api-gateway }}
      shared:             ${{ steps.filter.outputs.shared }}
      platform:           ${{ steps.filter.outputs.platform }}
      any-service:        ${{ steps.any.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Path filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            identity-api:
              - 'src/services/identity-api/**'
              - 'src/shared/**'
            payment-api:
              - 'src/services/payment-api/**'
              - 'src/shared/**'
            wallet-api:
              - 'src/services/wallet-api/**'
              - 'src/shared/**'
            account-api:
              - 'src/services/account-api/**'
              - 'src/shared/**'
            notification-api:
              - 'src/services/notification-api/**'
              - 'src/shared/**'
            api-gateway:
              - 'src/services/api-gateway/**'
              - 'src/shared/**'
            shared:
              - 'src/shared/**'
            platform:
              - 'platform/**'

      - name: Detect any service changed
        id: any
        run: |
          if [[ "${{ steps.filter.outputs.identity-api }}"     == "true" ]] ||
             [[ "${{ steps.filter.outputs.payment-api }}"      == "true" ]] ||
             [[ "${{ steps.filter.outputs.wallet-api }}"       == "true" ]] ||
             [[ "${{ steps.filter.outputs.account-api }}"      == "true" ]] ||
             [[ "${{ steps.filter.outputs.notification-api }}" == "true" ]] ||
             [[ "${{ steps.filter.outputs.api-gateway }}"      == "true" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  ###########################################################################
  # JOB 2 — Security scan (always runs on every push/PR)
  ###########################################################################
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: TruffleHog — secret scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified --fail

      - name: CodeQL — SAST
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-and-quality

      - name: Build for CodeQL
        run: dotnet build SuperApp.sln -c Release --no-restore

      - name: CodeQL — Analyse
        uses: github/codeql-action/analyze@v3

      - name: Trivy — IaC + K8s scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: platform/
          exit-code: 1
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-iac.sarif

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: trivy-iac.sarif }

      - name: NuGet vulnerability audit
        run: dotnet list SuperApp.sln package --vulnerable --include-transitive 2>&1 | tee audit.txt
             grep -q "no vulnerable packages" audit.txt || (cat audit.txt && exit 1)

  ###########################################################################
  # JOB 3 — Build + Test + Docker + Sign (matrix: one job per changed service)
  ###########################################################################
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, security-scan]
    if: needs.detect-changes.outputs.any-service == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identity-api
            changed: ${{ needs.detect-changes.outputs.identity-api }}
          - service: payment-api
            changed: ${{ needs.detect-changes.outputs.payment-api }}
          - service: wallet-api
            changed: ${{ needs.detect-changes.outputs.wallet-api }}
          - service: account-api
            changed: ${{ needs.detect-changes.outputs.account-api }}
          - service: notification-api
            changed: ${{ needs.detect-changes.outputs.notification-api }}
          - service: api-gateway
            changed: ${{ needs.detect-changes.outputs.api-gateway }}
    steps:
      - name: Skip if service not changed
        if: matrix.changed != 'true'
        run: echo "⏭ ${{ matrix.service }} not changed — skipping" && exit 0

      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with: { dotnet-version: "${{ env.DOTNET_VERSION }}" }

      - name: Restore
        run: dotnet restore SuperApp.sln

      - name: Build
        run: |
          dotnet build src/services/${{ matrix.service }}/src \
            -c Release --no-restore \
            /p:TreatWarningsAsErrors=true

      - name: Unit tests with coverage
        run: |
          dotnet test tests/unit \
            --no-restore \
            --filter "Category!=Integration" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --logger "trx;LogFileName=${{ matrix.service }}.trx"

      - name: Check coverage threshold (${{ env.COVERAGE_THRESHOLD }}%)
        run: |
          pip install coverage-threshold --quiet
          coverage-threshold \
            --line-coverage ${{ env.COVERAGE_THRESHOLD }} \
            TestResults/*/coverage.cobertura.xml || \
          (echo "❌ Coverage below ${{ env.COVERAGE_THRESHOLD }}%" && exit 1)

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests — ${{ matrix.service }}
          path: TestResults/${{ matrix.service }}.trx
          reporter: dotnet-trx

      - name: Login to ACR
        if: github.ref == 'refs/heads/main'
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_CLIENT_ID }}
          password: ${{ secrets.ACR_CLIENT_SECRET }}

      - name: Docker build + push
        if: github.ref == 'refs/heads/main'
        id: docker
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ matrix.service }}"
          SHA="${{ github.sha }}"
          SHORT="${SHA:0:8}"
          docker build \
            -f src/services/${{ matrix.service }}/Dockerfile \
            -t "${IMAGE}:${SHORT}" \
            -t "${IMAGE}:latest" \
            --build-arg BUILD_VERSION="${SHORT}" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .
          docker push "${IMAGE}:${SHORT}"
          docker push "${IMAGE}:latest"
          echo "image=${IMAGE}:${SHORT}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT}"      >> $GITHUB_OUTPUT

      - name: Trivy — container vulnerability scan
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.docker.outputs.image }}
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Cosign — sign container image
        if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign sign --yes ${{ steps.docker.outputs.image }}
          echo "✅ Image signed: ${{ steps.docker.outputs.image }}"

      - name: Output image digest
        if: github.ref == 'refs/heads/main'
        run: |
          echo "### 🐳 Image Built" >> $GITHUB_STEP_SUMMARY
          echo "- **Service**: ${{ matrix.service }}"    >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ steps.docker.outputs.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA**: \`${{ steps.docker.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY

  ###########################################################################
  # JOB 4 — Terraform plan (runs only when platform/** changes)
  ###########################################################################
  terraform-plan:
    name: Terraform Plan — ${{ matrix.env }}
    runs-on: ubuntu-latest
    needs: [detect-changes, security-scan]
    if: needs.detect-changes.outputs.platform == 'true'
    strategy:
      matrix:
        env: [dev, staging, prod]
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Azure OIDC login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.8.0" }

      - name: Terraform init
        working-directory: platform/terraform
        run: |
          terraform init \
            -backend-config="key=${{ matrix.env }}/terraform.tfstate" \
            -backend-config="resource_group_name=rg-superapp-tfstate" \
            -backend-config="storage_account_name=stsuperappterraform" \
            -backend-config="container_name=tfstate"

      - name: Terraform plan
        id: plan
        working-directory: platform/terraform
        run: |
          terraform plan \
            -var-file="environments/${{ matrix.env }}/terraform.tfvars" \
            -out=tfplan-${{ matrix.env }} \
            -no-color 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: OPA policy gate (no forbidden resources)
        run: |
          pip install opa-python-client --quiet
          python3 - << 'PY'
          import subprocess, sys, json
          result = subprocess.run(
            ["terraform", "show", "-json", "platform/terraform/tfplan-${{ matrix.env }}"],
            capture_output=True, text=True)
          plan = json.loads(result.stdout)
          # Block any resource tagged destroy=forbidden in prod
          if "${{ matrix.env }}" == "prod":
              changes = plan.get("resource_changes", [])
              destroys = [c for c in changes if "delete" in c.get("change", {}).get("actions", [])]
              if destroys:
                  print(f"❌ Plan contains {len(destroys)} DESTROY actions — blocked in prod")
                  sys.exit(1)
          print("✅ OPA policy gate passed")
          PY

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('platform/terraform/plan.txt', 'utf8');
            const truncated = plan.length > 3000 ? plan.slice(-3000) + '\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan — \`${{ matrix.env }}\`\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

  ###########################################################################
  # JOB 5 — Deploy to dev (auto, runs after build)
  ###########################################################################
  deploy-dev:
    name: Deploy → dev
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && needs.build.result == 'success'
    environment:
      name: development
      url: https://api.dev.superapp.com.gh
    steps:
      - uses: actions/checkout@v4

      - name: Azure OIDC login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-superapp-platform-dev \
            --name aks-superapp-dev \
            --overwrite-existing

      - name: ArgoCD sync all changed services
        run: |
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:8}"
          for svc in identity-api payment-api wallet-api account-api notification-api api-gateway; do
            argocd app set "dev-${svc}" \
              --helm-set "image.tag=${SHORT}" \
              --auth-token "${{ secrets.ARGOCD_TOKEN }}" \
              --server argocd.dev.superapp.com.gh --grpc-web 2>/dev/null || true
            argocd app sync "dev-${svc}" \
              --auth-token "${{ secrets.ARGOCD_TOKEN }}" \
              --server argocd.dev.superapp.com.gh --grpc-web --force --prune 2>/dev/null || true
          done

      - name: Smoke tests — dev
        run: |
          sleep 30
          curl -sf https://api.dev.superapp.com.gh/health | jq -e '.status=="Healthy"'
          echo "✅ Dev smoke test passed"

  ###########################################################################
  # JOB 6 — Deploy to staging (auto, after dev passes)
  ###########################################################################
  deploy-staging:
    name: Deploy → staging
    runs-on: ubuntu-latest
    needs: [deploy-dev]
    if: github.ref == 'refs/heads/main' && needs.deploy-dev.result == 'success'
    environment:
      name: staging
      url: https://api.staging.superapp.com.gh
    steps:
      - uses: actions/checkout@v4

      - name: Azure OIDC login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-superapp-platform-staging \
            --name aks-superapp-staging \
            --overwrite-existing

      - name: ArgoCD sync → staging
        run: |
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:8}"
          for svc in identity-api payment-api wallet-api account-api notification-api api-gateway; do
            argocd app set "staging-${svc}" \
              --helm-set "image.tag=${SHORT}" \
              --auth-token "${{ secrets.ARGOCD_TOKEN }}" \
              --server argocd.staging.superapp.com.gh --grpc-web 2>/dev/null || true
            argocd app sync "staging-${svc}" \
              --auth-token "${{ secrets.ARGOCD_TOKEN }}" \
              --server argocd.staging.superapp.com.gh --grpc-web --force --prune 2>/dev/null || true
          done

      - name: Integration tests — staging
        run: |
          dotnet test tests/integration \
            --filter "Category=Integration" \
            --no-restore \
            -e API_BASE_URL=https://api.staging.superapp.com.gh \
            -e AUTH_TOKEN="${{ secrets.STAGING_TEST_TOKEN }}"

  ###########################################################################
  # JOB 7 — Deploy to production (manual gate + canary + SLO verify)
  ###########################################################################
  deploy-prod:
    name: Deploy → production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main' && needs.deploy-staging.result == 'success'
    environment:
      name: production          # GitHub Environment: requires manual approval
      url: https://api.superapp.com.gh
    steps:
      - uses: actions/checkout@v4

      - name: Azure OIDC login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-superapp-platform-prod \
            --name aks-superapp-prod \
            --overwrite-existing

      - name: Deploy canary — 20% traffic
        run: |
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:8}"
          for svc in identity-api payment-api wallet-api account-api notification-api api-gateway; do
            argocd app set "prod-${svc}" \
              --helm-set "image.tag=${SHORT}" \
              --helm-set "rollout.canary.steps[0].setWeight=20" \
              --auth-token "${{ secrets.ARGOCD_TOKEN }}" \
              --server argocd.superapp.com.gh --grpc-web 2>/dev/null || true
            argocd app sync "prod-${svc}" \
              --auth-token "${{ secrets.ARGOCD_TOKEN }}" \
              --server argocd.superapp.com.gh --grpc-web --force 2>/dev/null || true
          done
          echo "⏳ Canary at 20% — waiting 5 minutes for SLO validation..."
          sleep 300

      - name: SLO gate — payment API error rate
        run: |
          RATE=$(curl -sf \
            "https://grafana.superapp.com.gh/api/datasources/proxy/1/api/v1/query" \
            -d 'query=sum(rate(http_requests_total{service="payment-api",code!~"2.."}[5m]))/sum(rate(http_requests_total{service="payment-api"}[5m]))' \
            -H "Authorization: Bearer ${{ secrets.GRAFANA_SERVICE_TOKEN }}" | \
            jq -r '.data.result[0].value[1] // "0"')
          echo "Payment API error rate: ${RATE}"
          python3 -c "rate=float('${RATE}'); exit(1 if rate > 0.001 else 0)" || \
            (echo "❌ Error rate ${RATE} exceeds 0.1% SLO — rolling back" && \
             argocd app rollback prod-payment-api \
               --auth-token "${{ secrets.ARGOCD_TOKEN }}" \
               --server argocd.superapp.com.gh --grpc-web && exit 1)
          echo "✅ SLO gate passed (error rate ${RATE})"

      - name: Promote canary to 100%
        run: |
          for svc in identity-api payment-api wallet-api account-api notification-api api-gateway; do
            kubectl argo rollouts promote "prod-${svc}" -n superapp-services 2>/dev/null || \
            kubectl argo rollouts promote "prod-${svc}" -n superapp-gateway  2>/dev/null || true
          done
          echo "✅ All services promoted to 100%"

      - name: Production smoke test
        run: |
          curl -sf https://api.superapp.com.gh/health | jq -e '.status=="Healthy"'
          echo "✅ Production healthy"

      - name: PagerDuty — resolve any open deploy alerts
        run: |
          curl -sf -X POST https://events.pagerduty.com/v2/enqueue \
            -H "Content-Type: application/json" \
            -d "{
              \"routing_key\": \"${{ secrets.PAGERDUTY_KEY }}\",
              \"event_action\": \"resolve\",
              \"dedup_key\": \"superapp-deploy-${{ github.sha }}\",
              \"payload\": {
                \"summary\": \"Production deployment ${{ github.sha }} succeeded\",
                \"severity\": \"info\",
                \"source\": \"github-actions\"
              }
            }" || true

  ###########################################################################
  # JOB 8 — DORA metrics
  ###########################################################################
  dora-metrics:
    name: DORA Metrics
    runs-on: ubuntu-latest
    needs: [deploy-prod]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Calculate and push DORA metrics
        run: |
          python3 << 'PY'
          import subprocess, time, urllib.request, json, os

          # Deployment frequency: deployments today
          today = subprocess.check_output(
            ["git","log","--since=midnight","--oneline","origin/main"],
            text=True).strip().count('\n') + 1

          # Lead time: time from first commit to deploy
          first_commit_time = subprocess.check_output(
            ["git","log","--reverse","--format=%ct","origin/main"], text=True
          ).split('\n')[0].strip()
          lead_time = int(time.time()) - int(first_commit_time or time.time())

          metrics = f"""# HELP superapp_deployments_today Deployment frequency metric
# TYPE superapp_deployments_today gauge
superapp_deployments_today{{env="prod"}} {today}
# HELP superapp_lead_time_seconds Lead time for changes
# TYPE superapp_lead_time_seconds gauge
superapp_lead_time_seconds{{env="prod"}} {lead_time}
# HELP superapp_deploy_success Deployment success indicator
# TYPE superapp_deploy_success gauge
superapp_deploy_success{{env="prod",sha="{os.environ.get('GITHUB_SHA','unknown')[:8]}"}} 1
"""
          print(metrics)
          # Push to Prometheus Pushgateway (if available)
          try:
            req = urllib.request.Request(
              os.environ.get('PROMETHEUS_PUSHGATEWAY_URL', 'http://localhost:9091') +
              '/metrics/job/github-actions/env/prod',
              data=metrics.encode(), method='POST')
            urllib.request.urlopen(req, timeout=5)
            print("✅ DORA metrics pushed to Prometheus")
          except Exception as e:
            print(f"⚠ Could not push to Pushgateway: {e}")
          PY

      - name: Post deployment summary
        run: |
          echo "### 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Author | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time   | $(date -u) |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Success |" >> $GITHUB_STEP_SUMMARY
