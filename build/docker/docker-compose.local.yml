###############################################################################
# SuperApp Local Development Stack
# Starts all external dependencies needed to run microservices locally.
# Usage: make local-up   (via Makefile)  or  docker compose -f build/docker/docker-compose.local.yml up -d
###############################################################################
version: "3.9"

services:

  # ── SQL Server (mimics Azure SQL) ─────────────────────────────────────────
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrong@Passw0rd", "-Q", "SELECT 1"]
      interval: 10s
      retries: 10

  sql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    depends_on:
      sql: { condition: service_healthy }
    volumes:
      - ./sql-init:/sql-init
    entrypoint: >
      bash -c "sleep 5 &&
        /opt/mssql-tools/bin/sqlcmd -S sql -U sa -P 'YourStrong@Passw0rd' -Q
        'CREATE DATABASE IF NOT EXISTS IdentityDB;
         CREATE DATABASE IF NOT EXISTS PaymentDB;
         CREATE DATABASE IF NOT EXISTS WalletDB;
         CREATE DATABASE IF NOT EXISTS AccountDB;
         CREATE DATABASE IF NOT EXISTS NotificationDB;'"

  # ── Redis (mimics Azure Cache for Redis) ──────────────────────────────────
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  # ── Kafka + Zookeeper (mimics Azure Event Hubs) ───────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk_data:/var/lib/zookeeper/data
      - zk_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      retries: 10

  # Apicurio Schema Registry
  schema-registry:
    image: apicurio/apicurio-registry-mem:2.5.0.Final
    depends_on:
      kafka: { condition: service_healthy }
    ports:
      - "8081:8080"
    environment:
      QUARKUS_HTTP_PORT: 8080

  # ── Kafka UI (topic/consumer group browser) ───────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on: [kafka, schema-registry]
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8080/apis/ccompat/v6

  # ── Grafana LGTM stack (Loki + Grafana + Tempo + Prometheus) ─────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.local.yml:/etc/prometheus/prometheus.yml:ro
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=7d"]

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana

  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  # ── Vault (dev mode — no persistence, auto-unsealed) ─────────────────────
  vault:
    image: hashicorp/vault:1.16
    cap_add: [IPC_LOCK]
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "superapp-dev-root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    command: server -dev
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s

volumes:
  sql_data:
  redis_data:
  kafka_data:
  zk_data:
  zk_log:
  grafana_data:
