###############################################################################
# SuperApp — Full Stack Docker Compose
# Runs all 6 services + all infrastructure locally.
# NOT for production. For staging smoke testing or local demo only.
# Usage: docker compose -f build/docker/docker-compose.full-stack.yml up --build
###############################################################################
version: "3.9"

x-common-env: &common-env
  SUPERAPP_Auth__Authority:           "http://identity-api:8080"
  SUPERAPP_Messaging__BootstrapServers: "kafka:29092"
  SUPERAPP_Telemetry__OtlpEndpoint:   "http://otel-collector:4317"

services:

  # ── Infrastructure (from local compose) ──────────────────────────────────
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment: { ACCEPT_EULA: "Y", MSSQL_SA_PASSWORD: "YourStrong@Passw0rd", MSSQL_PID: Developer }
    ports: ["1433:1433"]
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrong@Passw0rd", "-Q", "SELECT 1"]
      interval: 10s
      retries: 10

  redis:
    image: redis:7.2-alpine
    ports: ["6379:6379"]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 5s }

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment: { ZOOKEEPER_CLIENT_PORT: 2181, ZOOKEEPER_TICK_TIME: 2000 }

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.95.0
    ports: ["4317:4317", "8888:8888"]

  # ── Services ─────────────────────────────────────────────────────────────

  identity-api:
    build:
      context: ../..
      dockerfile: src/services/identity-api/Dockerfile
    ports: ["8081:8080"]
    environment:
      <<: *common-env
      SUPERAPP_ConnectionStrings__IdentityDb: "Server=sql;Database=IdentityDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True"
      SUPERAPP_Auth__Issuer:     "http://identity-api:8080"
      SUPERAPP_Auth__Audience:   "superapp-local"
      SUPERAPP_Auth__SigningKey: "local-dev-signing-key-32-chars-min!"
    depends_on:
      sql:   { condition: service_healthy }
      kafka: { condition: service_healthy }
    healthcheck: { test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/ready"], interval: 10s, retries: 5 }

  payment-api:
    build:
      context: ../..
      dockerfile: src/services/payment-api/Dockerfile
    ports: ["8083:8080"]
    environment:
      <<: *common-env
      SUPERAPP_ConnectionStrings__PaymentDb: "Server=sql;Database=PaymentDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True"
      SUPERAPP_ConnectionStrings__Redis:     "redis:6379"
      SUPERAPP_Auth__Authority: "http://identity-api:8080"
      SUPERAPP_Auth__Audience:  "superapp-local"
    depends_on:
      sql:           { condition: service_healthy }
      redis:         { condition: service_healthy }
      kafka:         { condition: service_healthy }
      identity-api:  { condition: service_healthy }
    healthcheck: { test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/ready"], interval: 10s, retries: 5 }

  wallet-api:
    build:
      context: ../..
      dockerfile: src/services/wallet-api/Dockerfile
    ports: ["8084:8080"]
    environment:
      <<: *common-env
      SUPERAPP_ConnectionStrings__WalletDb: "Server=sql;Database=WalletDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True"
      SUPERAPP_Auth__Authority: "http://identity-api:8080"
      SUPERAPP_Auth__Audience:  "superapp-local"
    depends_on:
      sql:          { condition: service_healthy }
      kafka:        { condition: service_healthy }
      identity-api: { condition: service_healthy }

  account-api:
    build:
      context: ../..
      dockerfile: src/services/account-api/Dockerfile
    ports: ["8082:8080"]
    environment:
      <<: *common-env
      SUPERAPP_ConnectionStrings__AccountDb: "Server=sql;Database=AccountDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True"
      SUPERAPP_Auth__Authority: "http://identity-api:8080"
      SUPERAPP_Auth__Audience:  "superapp-local"
    depends_on:
      sql:          { condition: service_healthy }
      identity-api: { condition: service_healthy }

  notification-api:
    build:
      context: ../..
      dockerfile: src/services/notification-api/Dockerfile
    ports: ["8085:8080"]
    environment:
      <<: *common-env
      SUPERAPP_Hubtel__BaseUrl:  "https://api.hubtel.com/"
      SUPERAPP_Hubtel__ApiKey:   "local-test-key"
      SUPERAPP_Hubtel__SenderId: "SuperApp"
    depends_on:
      kafka: { condition: service_healthy }

  api-gateway:
    build:
      context: ../..
      dockerfile: src/services/api-gateway/Dockerfile
    ports: ["8080:8080"]
    environment:
      SUPERAPP_Auth__Authority: "http://identity-api:8080"
      SUPERAPP_Auth__Audience:  "superapp-local"
    depends_on:
      identity-api: { condition: service_healthy }
      payment-api:  { condition: service_healthy }
      wallet-api:   { condition: service_healthy }
      account-api:  { condition: service_healthy }
    healthcheck: { test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"], interval: 10s, retries: 5 }
