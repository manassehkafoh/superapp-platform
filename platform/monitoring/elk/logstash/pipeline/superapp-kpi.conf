###############################################################################
# Logstash Pipeline: SuperApp KPI Data Pipeline
# Sources: Kafka topics, Filebeat, direct Beats agents
# Transforms: enrichment, KPI calculation, PII removal
# Outputs: Elasticsearch (KPI index), Prometheus Pushgateway (metrics)
###############################################################################

# ── INPUT: Kafka topics ───────────────────────────────────────────────────────
input {

  # Payment events from Kafka
  kafka {
    id             => "kafka-payment-events"
    bootstrap_servers => "${KAFKA_BOOTSTRAP_SERVERS}"
    topics         => [
      "superapp-payment-source",
      "superapp-transaction-logs",
      "superapp-wallet-events",
      "superapp-user-events",
      "superapp-audit-logs"
    ]
    group_id       => "logstash-kpi-consumer"
    codec          => json
    consumer_threads => 4
    auto_offset_reset => "latest"
    decorate_events => "extended"
    sasl_mechanism  => "PLAIN"
    security_protocol => "SASL_SSL"
    sasl_jaas_config => "org.apache.kafka.common.security.plain.PlainLoginModule required username='${KAFKA_USERNAME}' password='${KAFKA_PASSWORD}';"
    tags           => ["kafka", "domain-event"]
  }

  # Application logs from Filebeat (Kubernetes pods)
  beats {
    id   => "beats-app-logs"
    port => 5044
    tags => ["app-log", "filebeat"]
  }

  # HTTP input for direct metric pushes (NPS scores, manual KPI data)
  http {
    id   => "http-manual-kpi"
    port => 8080
    codec => json
    tags => ["manual-kpi"]
  }

}

# ── FILTER: Enrichment, transformation, PII removal ──────────────────────────
filter {

  # ── Parse JSON from Kafka domain events ─────────────────────────────────
  if "domain-event" in [tags] {
    mutate {
      rename => {
        "eventType"     => "[kpi][event_type]"
        "aggregateId"   => "[transaction][id]"
        "correlationId" => "[correlationId]"
        "occurredAt"    => "@timestamp"
      }
    }
  }

  # ── Parse Kubernetes log metadata from Filebeat ──────────────────────────
  if "app-log" in [tags] {
    if [kubernetes] {
      mutate {
        add_field => {
          "service"     => "%{[kubernetes][container][name]}"
          "environment" => "%{[kubernetes][namespace]}"
          "pod"         => "%{[kubernetes][pod][name]}"
        }
      }
    }

    # Parse structured JSON logs from .NET services
    if [message] =~ /^\{/ {
      json {
        source  => "message"
        target  => "parsed"
        tag_on_failure => ["_jsonparsefailure"]
      }
      mutate {
        rename => {
          "[parsed][level]"         => "level"
          "[parsed][correlationId]" => "correlationId"
          "[parsed][traceId]"       => "traceId"
          "[parsed][userId]"        => "[user][id]"
          "[parsed][paymentId]"     => "[transaction][id]"
          "[parsed][amount]"        => "[transaction][amount]"
          "[parsed][currency]"      => "[transaction][currency]"
          "[parsed][status]"        => "[transaction][status]"
          "[parsed][rail]"          => "[transaction][rail]"
          "[parsed][durationMs]"    => "[http][response_ms]"
        }
        remove_field => ["parsed"]
      }
    }
  }

  # ── PaymentInitiated event enrichment ─────────────────────────────────
  if [kpi][event_type] == "PaymentInitiated" or [eventType] == "PaymentInitiated" {
    mutate {
      add_field => {
        "[kpi][name]"    => "transaction_initiated"
        "[kpi][channel]" => "mobile"
        "[transaction][status]" => "pending"
      }
      add_tag  => ["payment-event", "kpi-transaction"]
    }
  }

  # ── PaymentCompleted enrichment ────────────────────────────────────────
  if [kpi][event_type] == "PaymentCompleted" or [eventType] == "PaymentCompleted" {
    mutate {
      add_field => {
        "[kpi][name]"           => "transaction_completed"
        "[kpi][status]"         => "success"
        "[transaction][status]" => "completed"
      }
      add_tag => ["payment-event", "kpi-transaction", "kpi-success"]
    }
  }

  # ── PaymentFailed enrichment ───────────────────────────────────────────
  if [kpi][event_type] == "PaymentFailed" or [eventType] == "PaymentFailed" {
    mutate {
      add_field => {
        "[kpi][name]"           => "transaction_failed"
        "[kpi][status]"         => "failed"
        "[transaction][status]" => "failed"
      }
      add_tag => ["payment-event", "kpi-transaction", "kpi-failure"]
    }
  }

  # ── UserRegistered event → KPI-2 Adoption Rate ────────────────────────
  if [kpi][event_type] == "UserRegistered" or [eventType] == "UserRegistered" {
    mutate {
      add_field => {
        "[kpi][name]"    => "user_adoption"
        "[kpi][channel]" => "mobile"
      }
      add_tag => ["user-event", "kpi-adoption"]
    }
  }

  # ── HTTP response time → API latency KPI ──────────────────────────────
  if [http][response_ms] and [http][status_code] {
    if [http][response_ms] > 2000 {
      mutate { add_tag => ["slow-request", "slo-risk"] }
    }
    if [http][status_code] >= 500 {
      mutate { add_tag => ["server-error", "kpi-failure"] }
    }
  }

  # ── PII SCRUBBING — remove sensitive fields before indexing ──────────
  mutate {
    remove_field => [
      "[user][email]",
      "[user][phone]",
      "[user][phoneNumber]",
      "[user][address]",
      "password",
      "passwordHash",
      "pin",
      "cvv",
      "cardNumber",
      "pan",
      "secret",
      "token",
      "refreshToken",
      "apiKey"
    ]
  }

  # Mask any remaining patterns that look like card numbers (PCI-DSS)
  if [message] =~ /\d{13,19}/ {
    mutate {
      gsub => ["message", '\b\d{13,19}\b', "****MASKED****"]
    }
  }

  # ── Timestamp normalisation ────────────────────────────────────────────
  if [@timestamp] {
    date {
      match   => ["@timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSZ", "UNIX_MS"]
      target  => "@timestamp"
      timezone => "Africa/Accra"
    }
  }

  # ── GeoIP enrichment (client IP if present) ────────────────────────────
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geo"
      fields => ["country_name", "region_name", "city_name"]
    }
  }

  # ── Index routing based on event type ──────────────────────────────────
  if "kpi-transaction" in [tags] {
    mutate {
      add_field => { "[@metadata][index_prefix]" => "superapp-kpi" }
      add_field => { "[@metadata][txn_index_prefix]" => "superapp-transactions" }
    }
  } else if "user-event" in [tags] {
    mutate { add_field => { "[@metadata][index_prefix]" => "superapp-kpi" } }
  } else if "audit" in [tags] {
    mutate { add_field => { "[@metadata][index_prefix]" => "superapp-audit" } }
  } else {
    mutate { add_field => { "[@metadata][index_prefix]" => "superapp-logs" } }
  }

  # Add date suffix for rolling indices
  ruby {
    code => "event.set('[@metadata][index_date]', Time.now.strftime('%Y.%m.%d'))"
  }

}

# ── OUTPUT: Elasticsearch + dead-letter queue ─────────────────────────────────
output {

  # Primary output: Elasticsearch
  elasticsearch {
    id              => "es-primary"
    hosts           => ["${ELASTICSEARCH_HOST}:9200"]
    user            => "${ELASTICSEARCH_USERNAME}"
    password        => "${ELASTICSEARCH_PASSWORD}"
    ssl             => true
    ssl_certificate_verification => true
    cacert          => "/etc/logstash/certs/ca.crt"

    # Dynamic index name: superapp-kpi-2024.01.15
    index           => "%{[@metadata][index_prefix]}-%{[@metadata][index_date]}"
    manage_template => false

    # Write to alias for ILM rollover
    pipeline => "superapp-kpi-ingest"

    # Retry on failure
    retry_on_conflict => 3

    # Bulk settings for throughput
    bulk_max_size   => 500
    bulk_size_threshold => 1048576
  }

  # Dead-letter queue for failed events
  if "_grokparsefailure" in [tags] or "_jsonparsefailure" in [tags] {
    elasticsearch {
      id     => "es-dlq"
      hosts  => ["${ELASTICSEARCH_HOST}:9200"]
      index  => "superapp-dlq-%{+YYYY.MM.dd}"
    }
  }

  # Debug: stdout in non-production
  if [environment] == "dev" or [environment] == "staging" {
    stdout {
      codec => rubydebug { metadata => false }
    }
  }

}
