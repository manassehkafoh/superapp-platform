###############################################################################
# Filebeat DaemonSet — Kubernetes pod log collection
# Deployed on every AKS node to collect container logs
###############################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
  namespace: monitoring
  labels:
    app: filebeat
data:
  filebeat.yml: |-
    filebeat.autodiscover:
      providers:
        - type: kubernetes
          node: ${NODE_NAME}
          hints.enabled: true
          hints.default_config:
            type: container
            paths:
              - /var/log/containers/*${data.kubernetes.container.id}.log
            multiline:
              pattern: '^[[:space:]]+(at|\.{3})\b|^Caused by:'
              negate:  false
              match:   after

    filebeat.inputs:
      - type: container
        paths:
          - /var/log/containers/identity-api*.log
          - /var/log/containers/payment-api*.log
          - /var/log/containers/wallet-api*.log
          - /var/log/containers/account-api*.log
          - /var/log/containers/notification-api*.log
          - /var/log/containers/api-gateway*.log
        processors:
          - add_kubernetes_metadata:
              host: ${NODE_NAME}
              matchers:
                - logs_path:
                    logs_path: "/var/log/containers/"
          - decode_json_fields:
              fields: ["message"]
              max_depth: 5
              target: ""
              overwrite_keys: true
          - drop_fields:
              fields: ["agent", "ecs", "host", "input", "log.offset"]
              ignore_missing: true

    output.logstash:
      hosts: ["logstash:5044"]
      loadbalance: true
      worker: 2
      bulk_max_size: 2048
      compression_level: 3

    processors:
      - add_fields:
          target: ""
          fields:
            environment: ${ENVIRONMENT:prod}
            cluster: superapp-aks

    logging.level: info
    logging.to_files: false
    monitoring.enabled: true
    monitoring.elasticsearch:
      hosts: ["${ELASTICSEARCH_HOST}:9200"]
      username: "${ELASTICSEARCH_USERNAME}"
      password: "${ELASTICSEARCH_PASSWORD}"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: filebeat
  namespace: monitoring
  labels:
    app: filebeat
spec:
  selector:
    matchLabels: { app: filebeat }
  template:
    metadata:
      labels: { app: filebeat }
    spec:
      serviceAccountName: filebeat
      terminationGracePeriodSeconds: 30
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: filebeat
          image: docker.elastic.co/beats/filebeat:8.13.0
          args: ["-c", "/etc/filebeat.yml", "-e"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: ELASTICSEARCH_HOST
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-credentials
                  key: host
            - name: ELASTICSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-credentials
                  key: username
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-credentials
                  key: password
          securityContext:
            runAsUser: 0
          resources:
            limits:   { cpu: "200m", memory: "200Mi" }
            requests: { cpu: "50m",  memory: "64Mi" }
          volumeMounts:
            - name: config
              mountPath: /etc/filebeat.yml
              subPath: filebeat.yml
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: filebeat-config
            defaultMode: 0600
        - name: varlibdockercontainers
          hostPath: { path: /var/lib/docker/containers }
        - name: varlog
          hostPath: { path: /var/log }
