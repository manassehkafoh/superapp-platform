groups:
- name: superapp.mobile.slo.alerts
  rules:
  - alert: PaymentSLOBreach
    expr: superapp:mobile_failed_transaction_rate > 0.1
    for: 2m
    labels:
      severity: critical
      team: payments
      kpi: KPI-6-FailedTransactionRate
    annotations:
      summary: Payment error rate {{ $value | printf "%.3f" }}% exceeds 0.1% SLO
      description: 'Mobile payment failed transaction rate is {{ $value | printf \"%.2f\" }}%

        KPI Target: < 0.1% | Current: {{ $value | printf \"%.3f\" }}%

        Dashboard: https://grafana.superapp.com.gh/d/mobile-kpis

        '
  - alert: PaymentSLOFastBurn
    expr: superapp:payment_slo_burn_rate_1h > 0.00144
    for: 5m
    labels:
      severity: warning
      team: payments
      kpi: KPI-6-FailedTransactionRate
    annotations:
      summary: Payment SLO fast burn — error budget being consumed rapidly
      description: At current rate, monthly error budget will be exhausted in ~2 hours
  - alert: MobileServiceDown
    expr: superapp:mobile_system_availability_percent < 99.5
    for: 1m
    labels:
      severity: critical
      team: platform
      kpi: KPI-5-SystemAvailability
    annotations:
      summary: Mobile service availability {{ $value | printf "%.2f" }}% below 99.9% SLO
      description: 'KPI-5 Target: 99.9% | Current: {{ $value | printf "%.3f" }}%'
  - alert: MobileHighLatency
    expr: superapp:api_latency_p99_ms{service=~"payment-api|wallet-api"} > 2000
    for: 5m
    labels:
      severity: warning
      team: platform
      kpi: APILatency
    annotations:
      summary: '{{ $labels.service }} p99 latency {{ $value | printf "%.0f" }}ms > 2000ms SLO'
      description: "KPI target: p99 < 500ms (warning), < 2000ms (critical).\n        High latency on {{ $labels.service }}\
        \ may indicate DB slow queries, GhIPSS rail latency, or resource pressure. Check Grafana traces panel and Kafka consumer\
        \ lag."
  - alert: LowActiveUsersRatio
    expr: superapp:mobile_active_users_ratio < 30
    for: 60m
    labels:
      severity: warning
      team: product
      kpi: KPI-1-ActiveUsersRatio
    annotations:
      summary: Mobile active users ratio {{ $value | printf "%.1f" }}% below 30% threshold
      description: 'KPI-1: Active Users Ratio has dropped to {{ $value | printf \"%.1f\" }}%

        This may indicate engagement issues or onboarding drop-off.

        '
  - alert: HighFailedTransactionRate
    expr: superapp:mobile_failed_transaction_rate > 0.5
    for: 5m
    labels:
      severity: warning
      team: payments
      kpi: KPI-6-FailedTransactionRate
    annotations:
      summary: Failed transaction rate {{ $value | printf "%.2f" }}% > 0.5% warning threshold
      description: "KPI-6 Warning threshold: > 0.5% failed transactions.\n        Current rate: {{ $value | printf \"%.3f\"\
        \ }}%. Investigate: payment-api logs, GhIPSS/ExpressPay availability, DB connection pool. SLO breach at > 0.1%."
  - alert: PaymentKafkaLagCritical
    expr: superapp:kafka_consumer_lag_total{topic="superapp-payment-source"} > 10000
    for: 5m
    labels:
      severity: critical
      team: payments
      kpi: PaymentProcessingLag
    annotations:
      summary: Payment Kafka lag {{ $value }} messages — risk of delayed transactions
      description: "Payment Kafka consumer lag is {{ $value }} messages on superapp-payment-source.\n        Risk: transactions\
        \ queued but not processed, customer-visible delays.\n        Actions: check payment-api pod count vs KEDA scaling,\
        \ Kafka partition count, and GhIPSS throughput limits."
  - alert: LowLoginFrequency
    expr: superapp:mobile_avg_login_frequency < 3
    for: 1d
    labels:
      severity: info
      team: product
      kpi: KPI-7-LoginFrequency
    annotations:
      summary: Average login frequency {{ $value | printf "%.1f" }}x/month below 3x target
      description: "KPI-7 Target: >= 8 logins per active customer per month.\n        Current average: {{ $value | printf\
        \ \"%.1f\" }} logins/customer/month.\n        Low frequency may indicate UX friction, notification gaps, or reduced\
        \ engagement. Review with Product team."
  - alert: LowAdoptionRate
    expr: superapp:mobile_adoption_rate < 2
    for: 7d
    labels:
      severity: warning
      team: product
      kpi: KPI-2-AdoptionRate
    annotations:
      summary: Mobile adoption rate {{ $value | printf "%.1f" }}% below 2% monthly target
      description: "KPI-2 Target: >= 5% new digital enrollments per month.\n        Current rate: {{ $value | printf \"%.1f\"\
        \ }}%.\n        Slow adoption may indicate onboarding friction, KYC drop-off, or reduced branch-to-digital migration.\
        \ Review funnel analytics in Kibana."
